name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dev tools
        uses: jdx/mise-action@v2

      - name: Run yamllint
        run: yamllint .

      - name: Validate platform variables
        run: bash tests/e2e/validate-vars.sh

      - name: Validate manifests
        run: |
          find infrastructure -name '*.yaml' -type f | xargs kubeconform -ignore-missing-schemas

  kubernetes:
    runs-on: ubuntu-latest-m
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          config: tests/e2e/kind-config.yaml

      - name: Install Flux
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash
          flux install

      - name: Apply test configuration
        run: |
          kubectl apply -f tests/e2e/test-vars.yaml
          kubectl apply -f tests/e2e/test-secrets.yaml

      - name: Create GitRepository source
        run: |
          flux create source git flux-platform \
            --url=https://github.com/${{ github.repository }} \
            --branch=${{ github.head_ref || github.ref_name }} \
            --interval=1m

      - name: Deploy platform modules
        run: bash tests/e2e/deploy.sh

      - name: Debug failure
        if: failure()
        run: |
          mkdir -p /tmp/flux-debug/flux

          echo "==> Flux state:"
          flux get kustomizations --all-namespaces 2>&1 | tee /tmp/flux-debug/flux/kustomizations.txt
          flux get helmreleases --all-namespaces 2>&1 | tee /tmp/flux-debug/flux/helmreleases.txt
          flux get sources all --all-namespaces 2>&1 | tee /tmp/flux-debug/flux/sources.txt
          kubectl get pods --all-namespaces 2>&1 | tee /tmp/flux-debug/flux/pods.txt

          echo "==> Kubernetes events (sorted by time):"
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' 2>&1 \
            | tail -50 | tee /tmp/flux-debug/flux/events.txt

          echo "==> Flux controller logs:"
          kubectl logs -n flux-system deploy/kustomize-controller --tail=50 2>&1 \
            | tee /tmp/flux-debug/flux/kustomize-controller.txt
          kubectl logs -n flux-system deploy/helm-controller --tail=50 2>&1 \
            | tee /tmp/flux-debug/flux/helm-controller.txt

          echo "==> Collecting cluster-info dump (organized by namespace/pod)..."
          kubectl cluster-info dump --all-namespaces \
            --output-directory=/tmp/flux-debug/cluster-dump 2>/dev/null || true

          echo "==> Exporting KinD node logs (organized by node)..."
          kind export logs /tmp/flux-debug/kind-logs --name=chart-testing 2>/dev/null || true

      - name: Write job summary
        if: failure()
        run: |
          {
            echo "## E2E Failure Debug Summary"
            echo ""
            echo "### Flux Kustomizations"
            echo '```'
            cat /tmp/flux-debug/flux/kustomizations.txt 2>/dev/null || echo "(not captured)"
            echo '```'
            echo ""
            echo "### Flux HelmReleases"
            echo '```'
            cat /tmp/flux-debug/flux/helmreleases.txt 2>/dev/null || echo "(not captured)"
            echo '```'
            echo ""
            echo "### Flux Sources"
            echo '```'
            cat /tmp/flux-debug/flux/sources.txt 2>/dev/null || echo "(not captured)"
            echo '```'
            echo ""
            echo "### All Pods"
            echo '```'
            cat /tmp/flux-debug/flux/pods.txt 2>/dev/null || echo "(not captured)"
            echo '```'
            echo ""
            echo "### Recent Events"
            echo '```'
            cat /tmp/flux-debug/flux/events.txt 2>/dev/null || echo "(not captured)"
            echo '```'
            echo ""
            echo "### Flux Controller Logs (kustomize-controller)"
            echo '```'
            cat /tmp/flux-debug/flux/kustomize-controller.txt 2>/dev/null || echo "(not captured)"
            echo '```'
            echo ""
            echo "### Flux Controller Logs (helm-controller)"
            echo '```'
            cat /tmp/flux-debug/flux/helm-controller.txt 2>/dev/null || echo "(not captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flux-debug-${{ github.run_id }}
          path: /tmp/flux-debug/
          retention-days: 7
