apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jaegertracing
  namespace: flux-system
spec:
  interval: 24h
  url: https://jaegertracing.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jaeger-operator
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: jaeger-operator
      version: '>=2.54.0'
      sourceRef:
        kind: HelmRepository
        name: jaegertracing
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    rbac:
      create: true
