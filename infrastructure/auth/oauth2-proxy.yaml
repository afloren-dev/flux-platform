apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
  namespace: auth
data:
  oauth2_proxy.cfg: |
    provider = "oidc"
    oidc_issuer_url = "https://dex.${DOMAIN}"
    redirect_url = "https://oauth2-proxy.${DOMAIN}/oauth2/callback"
    upstreams = [ "static://200" ]
    email_domains = [ "*" ]
    client_id = "oauth2-proxy"
    cookie_secret = "${OAUTH_COOKIE_SECRET}"
    cookie_secure = "true"
    cookie_domains = [ ".${DOMAIN}" ]
    whitelist_domains = [ ".${DOMAIN}" ]
    http_address = "0.0.0.0:4180"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --config=/etc/oauth2-proxy/oauth2_proxy.cfg
            - --client-secret=${OAUTH_CLIENT_SECRET}
          ports:
            - name: http
              containerPort: 4180
          volumeMounts:
            - name: config
              mountPath: /etc/oauth2-proxy
      volumes:
        - name: config
          configMap:
            name: oauth2-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: auth
spec:
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: 4180
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: oauth2-proxy
  namespace: auth
spec:
  hosts:
    - oauth2-proxy.${DOMAIN}
  gateways:
    - istio-ingress/gateway
  http:
    - route:
        - destination:
            host: oauth2-proxy
            port:
              number: 4180
