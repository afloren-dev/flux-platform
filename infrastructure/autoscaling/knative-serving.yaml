apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: knative
  namespace: flux-system
spec:
  interval: 24h
  url: https://knative.dev/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: knative-serving
  namespace: knative-serving
spec:
  interval: 30m
  chart:
    spec:
      chart: knative-serving
      version: '>=1.15.0'
      sourceRef:
        kind: HelmRepository
        name: knative
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    autoscaling:
      enabled: true
      minScale: 0
      maxScale: 10
