repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: local
    hooks:
      - id: kubeconform
        name: Validate Kubernetes manifests
        entry: bash -c 'kubeconform -ignore-missing-schemas "$@"' --
        language: system
        files: ^infrastructure/.*\.yaml$
        types: [yaml]

      - id: check-platform-vars
        name: Check platform variable coverage
        entry: bash tests/e2e/validate-vars.sh
        language: system
        pass_filenames: false
        files: ^(infrastructure/.*\.yaml|tests/e2e/test-(vars|secrets)\.yaml)$
